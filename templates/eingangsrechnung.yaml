# Buchungsvorlage: Eingangsrechnung
# Lieferantenrechnung mit Vorsteuer buchen

name: Eingangsrechnung
beschreibung: >
  Bucht eine Eingangsrechnung (Lieferantenrechnung) mit automatischer
  Vorsteuerberechnung. Unterstuetzt 19%, 7% und Reverse-Charge.

parameter:
  - name: netto_betrag
    typ: decimal
    pflicht: true
    beschreibung: Nettobetrag der Rechnung in EUR

  - name: steuersatz
    typ: enum
    pflicht: true
    werte: [19, 7, 0]
    default: 19
    beschreibung: USt-Satz in Prozent

  - name: aufwandskonto
    typ: integer
    pflicht: true
    beschreibung: SKR03-Aufwandskonto (z.B. 4400 fuer Buerobedarf)

  - name: belegdatum
    typ: date
    pflicht: true
    format: YYYYMMDD
    beschreibung: Datum des Belegs

  - name: buchungstext
    typ: string
    pflicht: true
    max_laenge: 80
    beschreibung: Beschreibung des Geschaeftsvorfalls

  - name: gegenkonto
    typ: integer
    pflicht: false
    default: 1200
    beschreibung: "Gegenkonto: 1200 = Bank, 1600 = Verbindlichkeiten"

  - name: lieferantennummer
    typ: integer
    pflicht: false
    beschreibung: Collmex-Lieferantennummer (bei Personenkonten)

positionen:
  - name: Aufwand
    konto: "{aufwandskonto}"
    seite: S
    betrag_formel: "{netto_betrag}"
    bu_schluessel: "{steuersatz}"

  - name: Vorsteuer
    konto: "{vorsteuer_konto}"
    seite: S
    betrag_formel: "round({netto_betrag} * {steuersatz} / 100, 2)"
    bedingung: "{steuersatz} > 0"

  - name: Gegenkonto
    konto: "{gegenkonto}"
    seite: H
    betrag_formel: "round({netto_betrag} * (1 + {steuersatz} / 100), 2)"

validierung:
  - regel: soll_gleich_haben
    beschreibung: Summe Soll muss gleich Summe Haben sein

  - regel: betrag_positiv
    beschreibung: Alle Betraege muessen positiv sein

  - regel: konto_existiert
    beschreibung: Alle Konten muessen im SKR03 existieren

  - regel: datum_im_geschaeftsjahr
    beschreibung: Belegdatum muss im aktuellen oder vorherigen Geschaeftsjahr liegen
